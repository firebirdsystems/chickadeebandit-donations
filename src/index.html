<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/run/donations/" />
  <title>Let Go</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: var(--hub-bg, #f7f8f5);
      --card: var(--hub-surface, #ffffff);
      --border: var(--hub-border, #dfe4dc);
      --border-mid: #c9d2c3;
      --text: var(--hub-text, #17201a);
      --muted: var(--hub-text-muted, #657063);
      --accent: var(--hub-primary, #1f5f4a);
      --accent-hover: #174a3a;
      --accent-fg: var(--hub-primary-fg, #ffffff);
      --soft: #eef3e9;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --amber: #b45309;
      --amber-soft: #fef3c7;
      --green: #15803d;
      --green-soft: #dcfce7;
      --red: #b91c1c;
      --red-soft: #fee2e2;
      --radius: var(--hub-radius, 0.5rem);
      --shadow: 0 1px 3px rgba(23, 32, 26, .08);
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: var(--hub-font-size, 15px);
      line-height: 1.5;
    }
    .app { max-width: 820px; margin: 0 auto; padding: 18px 16px 72px; }
    .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 16px; }
    h1 { font-size: 1.35rem; line-height: 1.2; }
    .subtle { color: var(--muted); font-size: .86rem; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      min-height: 36px; padding: 8px 14px; border-radius: 8px;
      border: 1.5px solid transparent; font: inherit; font-size: .86rem; font-weight: 700;
      cursor: pointer; background: var(--card); color: var(--text);
    }
    .btn:disabled { opacity: .48; cursor: default; }
    .btn-primary { background: var(--accent); color: var(--accent-fg); }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-ghost { border-color: var(--border-mid); color: var(--muted); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-sm { min-height: 30px; padding: 5px 10px; font-size: .78rem; }
    .tabs {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
      background: var(--border); padding: 3px; border-radius: 10px; margin-bottom: 14px;
    }
    .tab {
      border: 0; border-radius: 8px; padding: 8px 6px; background: transparent;
      color: var(--muted); font-weight: 800; font-size: .82rem; cursor: pointer;
    }
    .tab.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; box-shadow: var(--shadow); }
    .stat strong { display: block; font-size: 1.15rem; }
    .stat span { color: var(--muted); font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .item {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow); margin-bottom: 10px; overflow: hidden;
    }
    .item.collapsed .item-detail, .item.collapsed .comments { display: none; }
    .item-main { padding: 14px; }
    .item-top { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .item-title-btn { background: none; border: 0; color: inherit; font: inherit; text-align: left; cursor: pointer; padding: 0; }
    .item-title-line { display: flex; gap: 8px; align-items: center; }
    .chevron { color: var(--muted); font-size: .9rem; width: 14px; flex: 0 0 auto; }
    .item h2 { font-size: 1rem; line-height: 1.3; margin-bottom: 4px; }
    .meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; color: var(--muted); font-size: .78rem; }
    .badge { display: inline-flex; align-items: center; border-radius: 999px; padding: 2px 8px; font-weight: 800; font-size: .72rem; white-space: nowrap; }
    .badge-active { background: var(--blue-soft); color: var(--blue); }
    .badge-keep { background: var(--green-soft); color: var(--green); }
    .badge-let_go { background: #ede9fe; color: #6d28d9; }
    .badge-unsure { background: var(--amber-soft); color: var(--amber); }
    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
    .fact { background: var(--soft); border-radius: 8px; padding: 8px 10px; min-height: 52px; }
    .fact span { display: block; color: var(--muted); font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .fact strong { font-size: .86rem; }
    .reasons { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .reason { border-left: 3px solid var(--border-mid); padding-left: 10px; color: var(--muted); font-size: .86rem; min-width: 0; overflow-wrap: anywhere; }
    .action-panel { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
    .action-head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 7px; }
    .action-label { color: var(--text); font-size: .78rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; }
    .vote-row, .decision-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .decision-row { margin-top: 8px; padding: 10px; border-radius: 8px; background: #fbfcfa; border: 1px solid var(--border); }
    .vote { border-color: var(--border); }
    .vote.active { border-color: var(--accent); background: var(--soft); color: var(--accent); }
    .finalize { border-color: transparent; background: var(--accent); color: var(--accent-fg); }
    .finalize:hover { background: var(--accent-hover); }
    .danger { border-color: var(--red-soft); color: var(--red); background: var(--card); }
    .danger:hover { background: var(--red-soft); border-color: var(--red-soft); }
    .edit-link { margin-left: auto; }
    .adult-note { padding: 9px 10px; border-radius: 8px; background: var(--soft); color: var(--muted); font-size: .82rem; }
    .pager { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 12px 0; color: var(--muted); font-size: .84rem; }
    .pager-actions { display: flex; gap: 6px; }
    .report-controls { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
    .report-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; align-items: end; }
    .report-list { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .report-row { display: grid; grid-template-columns: 1.4fr .8fr .8fr .8fr; gap: 10px; padding: 10px 12px; border-bottom: 1px solid var(--border); align-items: center; font-size: .86rem; }
    .report-row:last-child { border-bottom: 0; }
    .report-row.head { background: #fbfcfa; color: var(--muted); font-size: .72rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; }
    .report-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .comments { border-top: 1px solid var(--border); background: #fbfcfa; padding: 12px 14px; }
    .comment { display: flex; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .comment:last-of-type { border-bottom: 0; }
    .avatar {
      width: 24px; height: 24px; border-radius: 50%; flex: 0 0 auto;
      display: inline-flex; align-items: center; justify-content: center; color: white;
      font-size: .68rem; font-weight: 900;
    }
    .comment-body { min-width: 0; flex: 1; }
    .comment-body p { overflow-wrap: anywhere; }
    .comment-form { display: flex; gap: 8px; margin-top: 8px; }
    .comment-form input { flex: 1; min-width: 0; }
    input, textarea, select {
      width: 100%; border: 1.5px solid var(--border-mid); border-radius: 8px;
      padding: 9px 11px; font: inherit; background: var(--card); color: var(--text); outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { min-height: 68px; resize: vertical; }
    label { display: block; color: var(--muted); font-size: .76rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 5px; }
    .empty { text-align: center; color: var(--muted); padding: 44px 18px; }
    .empty strong { display: block; color: var(--text); font-size: 1rem; margin-bottom: 4px; }
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.42); z-index: 50;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal {
      background: var(--card); border-radius: 14px 14px 0 0; width: 100%; max-width: 620px;
      max-height: 92vh; overflow: auto; padding: 18px;
    }
    .modal h3 { font-size: 1.08rem; margin-bottom: 14px; }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .field { margin-bottom: 12px; }
    .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .toast { position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%); background: #17201a; color: white; padding: 10px 14px; border-radius: 9px; font-size: .84rem; box-shadow: 0 8px 24px rgba(0,0,0,.22); z-index: 80; }
    @media (max-width: 640px) {
      .header { align-items: stretch; flex-direction: column; }
      .summary, .grid, .reasons, .form-grid { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: repeat(2, 1fr); }
      .item-top { flex-direction: column; }
      .comment-form { flex-direction: column; }
      .report-grid, .report-row { grid-template-columns: 1fr; }
    }
    @media (min-width: 641px) {
      .modal-backdrop { align-items: center; padding: 20px; }
      .modal { border-radius: 14px; }
    }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>Let Go</h1>
      <div class="subtle" id="who"></div>
    </div>
    <button class="btn btn-primary" onclick="openItemModal()">+ Add item</button>
  </div>
  <div id="root"><div class="empty">Loading...</div></div>
</div>

<script type="module">
import { hubConfirm } from "/hub-sdk.js";

const CONTEXT = window.__CONTEXT_URL ?? "";
const DB = window.__DB_URL ?? "";
const ME = window.__CURRENT_MEMBER ?? null;
const APP_ID = window.__APP_ID ?? "donations";

const statusLabels = {
  active: "Deciding",
  keep: "Keep",
  let_go: "Let go",
  unsure: "Purge-atory",
  archived: "Archived",
};
const dispositionLabels = {
  donated: "Donated",
  sold: "Sold",
  recycled: "Recycled",
  discarded: "Discarded",
  given_away: "Given away",
  other: "Other",
};
const tabs = [
  ["active", "Deciding"],
  ["let_go", "Let go"],
  ["unsure", "Purge-atory"],
  ["archive", "Archive"],
  ["reports", "Reports"],
];
const demoMembers = [
  { id: "demo-1", name: "Alex", role: "adult" },
  { id: "demo-2", name: "Jordan", role: "adult" },
  { id: "demo-3", name: "Casey", role: "child" },
];

let members = [];
let items = [];
let votes = [];
let comments = [];
let activeTab = "active";
let modalEl = null;
let toastTimer = null;
let pageByTab = { active: 1, let_go: 1, unsure: 1, archive: 1 };
let expandedById = {};
const thisYear = new Date().getFullYear();
let reportState = { from: `${thisYear}-01-01`, to: `${thisYear}-12-31`, action: "all" };
const PAGE_SIZE = 10;

function esc(value) {
  return String(value ?? "").replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
}
function money(cents) {
  const n = Number(cents || 0);
  return n > 0 ? `$${(n / 100).toFixed(n % 100 === 0 ? 0 : 2)}` : "Not set";
}
function memberName(id) { return members.find(m => m.id === id)?.name ?? "Someone"; }
function isAdult() {
  const me = ME ?? members.find(m => m.id === myId());
  return !!me && (me.role === "adult" || me.role === "admin");
}
function initial(name) { return String(name || "?").trim().slice(0, 1).toUpperCase(); }
function colorFor(id) {
  const colors = ["#1f5f4a", "#7c3aed", "#0369a1", "#b45309", "#be123c", "#0f766e"];
  let hash = 0;
  for (const ch of String(id || "")) hash = ((hash << 5) - hash) + ch.charCodeAt(0);
  return colors[Math.abs(hash) % colors.length];
}
function todayPlusMonths(months) {
  const d = new Date();
  d.setMonth(d.getMonth() + months);
  return d.toISOString().slice(0, 10);
}
function nowIso() { return new Date().toISOString(); }
function myId() { return ME?.id ?? "demo-1"; }

async function dbRun(sql, params = []) {
  if (!DB) return { rows: [] };
  try {
    const res = await fetch(DB, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sql, params }),
    });
    return await res.json();
  } catch {
    return { rows: [] };
  }
}

async function loadMembers() {
  if (!CONTEXT) {
    members = demoMembers;
    return;
  }
  try {
    const res = await fetch(`${CONTEXT}?keys=family.members`);
    members = ((await res.json())["family.members"]) ?? [];
  } catch {
    members = [];
  }
  if (!members.length) members = demoMembers;
}

async function loadData() {
  if (!DB) {
    const base = "2026-06-01T12:00:00.000Z";
    items = [
      {
        id: "demo-item-1", name: "Bread machine", category: "Kitchen", location: "Basement shelf",
        created_by: "demo-1", status: "active", visibility: "household", used_recently: "no",
        broken_status: "working", repair_possible: "unknown", repair_cost_cents: 0, estimated_value_cents: 2500,
        has_home: "no", keep_reason: "It makes the house smell amazing.",
        let_go_reason: "Nobody has used it since last winter.", decision_note: "", reevaluate_on: "",
        disposition_action: "", disposition_at: "", disposition_note: "", disposition_by: "", donation_reportable: "no",
        decided_by: "", decided_at: "", created_at: base, updated_at: base,
      },
      {
        id: "demo-item-2", name: "Outgrown bike helmet", category: "Garage", location: "Mudroom hook",
        created_by: "demo-2", status: "archived", visibility: "household", used_recently: "no",
        broken_status: "working", repair_possible: "unknown", repair_cost_cents: 0, estimated_value_cents: 800,
        has_home: "yes", keep_reason: "", let_go_reason: "Still usable, but too small.",
        decision_note: "Ready for the let-go queue.", reevaluate_on: "", decided_by: "demo-2", decided_at: base,
        disposition_action: "donated", disposition_at: "2026-06-10", disposition_note: "Dropped at community thrift store.", disposition_by: "demo-2", donation_reportable: "yes",
        created_at: base, updated_at: base,
      },
      {
        id: "demo-item-3", name: "Box of old school projects", category: "Memories", location: "Purge-atory box",
        created_by: "demo-3", status: "unsure", visibility: "household", used_recently: "no",
        broken_status: "working", repair_possible: "unknown", repair_cost_cents: 0, estimated_value_cents: 0,
        has_home: "no", keep_reason: "Some are funny and sweet.",
        let_go_reason: "The box is taking over the closet.", decision_note: "Review after taking photos.",
        disposition_action: "", disposition_at: "", disposition_note: "", disposition_by: "", donation_reportable: "no",
        reevaluate_on: todayPlusMonths(6), decided_by: "demo-1", decided_at: base, created_at: base, updated_at: base,
      },
    ];
    votes = [
      { id: "v1", item_id: "demo-item-1", member_id: "demo-1", vote: "let_go", note: "", created_at: base, updated_at: base },
      { id: "v2", item_id: "demo-item-1", member_id: "demo-2", vote: "keep", note: "", created_at: base, updated_at: base },
    ];
    comments = [
      { id: "c1", item_id: "demo-item-1", member_id: "demo-2", kind: "comment", body: "I would use it if it lived upstairs.", created_at: base },
    ];
    return;
  }
  const [itemRes, voteRes, commentRes] = await Promise.all([
    dbRun("SELECT * FROM app_donations__items ORDER BY updated_at DESC"),
    dbRun("SELECT * FROM app_donations__votes ORDER BY updated_at DESC"),
    dbRun("SELECT * FROM app_donations__comments ORDER BY created_at ASC"),
  ]);
  items = itemRes.rows ?? [];
  votes = voteRes.rows ?? [];
  comments = commentRes.rows ?? [];
}

async function addActivity(itemId, action, detail = "") {
  if (!DB) return;
  await dbRun(
    "INSERT INTO app_donations__activity (id, item_id, actor_id, action, detail, created_at) VALUES (?, ?, ?, ?, ?, ?)",
    [crypto.randomUUID(), itemId, myId(), action, detail, nowIso()]
  );
}

function itemsForTab() {
  if (activeTab === "archive") {
    return items.filter(i => ["keep", "archived"].includes(i.status));
  }
  if (activeTab === "reports") return [];
  return items.filter(i => i.status === activeTab);
}
function isExpanded(item) {
  if (Object.prototype.hasOwnProperty.call(expandedById, item.id)) return expandedById[item.id];
  return activeTab === "active";
}

function render() {
  const me = ME?.name ? `Signed in as ${ME.name}` : "Demo mode";
  document.getElementById("who").textContent = me;
  const counts = {
    active: items.filter(i => i.status === "active").length,
    let_go: items.filter(i => i.status === "let_go").length,
    unsure: items.filter(i => i.status === "unsure").length,
  };
  if (activeTab === "reports") {
    document.getElementById("root").innerHTML = `
      <div class="tabs">
        ${tabs.map(([key, label]) => `<button class="tab ${activeTab === key ? "active" : ""}" onclick="setTab('${key}')">${label}</button>`).join("")}
      </div>
      ${renderReports()}
    `;
    return;
  }
  const allVisible = itemsForTab();
  const totalPages = Math.max(1, Math.ceil(allVisible.length / PAGE_SIZE));
  pageByTab[activeTab] = Math.min(Math.max(pageByTab[activeTab] ?? 1, 1), totalPages);
  const page = pageByTab[activeTab];
  const visible = allVisible.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
  document.getElementById("root").innerHTML = `
    <div class="tabs">
      ${tabs.map(([key, label]) => `<button class="tab ${activeTab === key ? "active" : ""}" onclick="setTab('${key}')">${label}</button>`).join("")}
    </div>
    <div class="summary">
      <div class="stat"><strong>${counts.active}</strong><span>Deciding</span></div>
      <div class="stat"><strong>${counts.let_go}</strong><span>Let go</span></div>
      <div class="stat"><strong>${counts.unsure}</strong><span>Purge-atory</span></div>
    </div>
    ${allVisible.length ? `${visible.map(renderItem).join("")}${renderPager(allVisible.length, page, totalPages)}` : renderEmpty()}
  `;
}

function reportRows() {
  const from = reportState.from || "0000-01-01";
  const to = reportState.to || "9999-12-31";
  return items
    .filter(i => i.disposition_action && i.disposition_at)
    .filter(i => reportState.action === "all" || i.disposition_action === reportState.action)
    .filter(i => i.disposition_at >= from && i.disposition_at <= to)
    .sort((a, b) => String(b.disposition_at).localeCompare(String(a.disposition_at)));
}

function renderReports() {
  const rows = reportRows();
  const reportableDonations = rows.filter(i => i.disposition_action === "donated" && i.donation_reportable === "yes");
  const totalValue = rows.reduce((sum, i) => sum + Number(i.estimated_value_cents || 0), 0);
  const donationValue = reportableDonations.reduce((sum, i) => sum + Number(i.estimated_value_cents || 0), 0);
  return `
    <div class="summary">
      <div class="stat"><strong>${rows.length}</strong><span>Actions</span></div>
      <div class="stat"><strong>${money(totalValue)}</strong><span>Total value</span></div>
      <div class="stat"><strong>${money(donationValue)}</strong><span>Donation report</span></div>
    </div>
    <div class="report-controls">
      <div class="report-grid">
        <div class="field"><label>From</label><input type="date" value="${esc(reportState.from)}" onchange="setReportFilter('from', this.value)" /></div>
        <div class="field"><label>To</label><input type="date" value="${esc(reportState.to)}" onchange="setReportFilter('to', this.value)" /></div>
        <div class="field"><label>Action</label>${select("report-action", reportState.action, [["all", "All actions"], ["donated", "Donated"], ["sold", "Sold"], ["recycled", "Recycled"], ["discarded", "Discarded"], ["given_away", "Given away"], ["other", "Other"]]).replace("<select", "<select onchange=\"setReportFilter('action', this.value)\"")}</div>
        <div class="report-actions">
          <button class="btn btn-sm btn-ghost" onclick="resetReportYear()">This year</button>
          <button class="btn btn-sm btn-primary" onclick="copyReportCsv()">Copy CSV</button>
          <button class="btn btn-sm btn-ghost" onclick="downloadReportCsv()">Download</button>
        </div>
      </div>
    </div>
    ${rows.length ? `
      <div class="report-list">
        <div class="report-row head"><span>Item</span><span>Action</span><span>Date</span><span>Value</span></div>
        ${rows.map(renderReportRow).join("")}
      </div>
    ` : `<div class="empty"><strong>No actions in this range.</strong>Try a wider date range or a different action filter.</div>`}
  `;
}

function renderReportRow(item) {
  const label = dispositionLabels[item.disposition_action] ?? item.disposition_action;
  const reportNote = item.donation_reportable === "yes" ? " · reportable" : "";
  return `
    <div class="report-row">
      <span><strong>${esc(item.name)}</strong><br><span class="subtle">${esc(item.category || "Uncategorized")}${item.disposition_note ? ` · ${esc(item.disposition_note)}` : ""}</span></span>
      <span>${esc(label)}${reportNote}</span>
      <span>${esc(item.disposition_at)}</span>
      <span>${money(item.estimated_value_cents)}</span>
    </div>
  `;
}

function renderPager(total, page, totalPages) {
  if (totalPages <= 1) return "";
  const start = (page - 1) * PAGE_SIZE + 1;
  const end = Math.min(total, page * PAGE_SIZE);
  return `
    <div class="pager">
      <span>Showing ${start}-${end} of ${total}</span>
      <div class="pager-actions">
        <button class="btn btn-sm btn-ghost" onclick="setPage(${page - 1})" ${page <= 1 ? "disabled" : ""}>Previous</button>
        <button class="btn btn-sm btn-ghost" onclick="setPage(${page + 1})" ${page >= totalPages ? "disabled" : ""}>Next</button>
      </div>
    </div>
  `;
}

function renderEmpty() {
  const copy = {
    active: ["No items are up for debate.", "Add something that needs a household decision."],
    let_go: ["The let-go list is empty.", "Items the household has agreed to release will collect here."],
    unsure: ["Nothing is in Purge-atory.", "Unsure items can wait here until their review date."],
    archive: ["No archived decisions yet.", "Kept and archived items will appear here."],
  }[activeTab];
  return `<div class="empty"><strong>${copy[0]}</strong>${copy[1]}</div>`;
}

function renderItem(item) {
  const id = esc(item.id);
  const itemVotes = votes.filter(v => v.item_id === item.id);
  const mine = itemVotes.find(v => v.member_id === myId());
  const expanded = isExpanded(item);
  const tally = ["keep", "let_go", "unsure"].map(vote => {
    const count = itemVotes.filter(v => v.vote === vote).length;
    return count ? `${statusLabels[vote]} ${count}` : "";
  }).filter(Boolean).join(" | ") || "No votes yet";
  const itemComments = comments.filter(c => c.item_id === item.id);
  return `
    <article class="item ${expanded ? "" : "collapsed"}">
      <div class="item-main">
        <div class="item-top">
          <div>
            <button class="item-title-btn" onclick="toggleItem('${id}')">
              <div class="item-title-line">
                <span class="chevron">${expanded ? "▾" : "▸"}</span>
                <h2>${esc(item.name)}</h2>
              </div>
            </button>
            <div class="meta">
              <span class="badge badge-${esc(item.status)}">${esc(statusLabels[item.status] ?? item.status)}</span>
              <span>${esc(item.category || "Uncategorized")}</span>
              <span>Added by ${esc(memberName(item.created_by))}</span>
            </div>
          </div>
          ${item.status === "unsure" && item.reevaluate_on ? `<span class="badge badge-unsure">Review ${esc(item.reevaluate_on)}</span>` : ""}
        </div>
        <div class="item-detail">
          <div class="grid">
            <div class="fact"><span>Used recently</span><strong>${esc(answerLabel(item.used_recently))}</strong></div>
            <div class="fact"><span>Condition</span><strong>${esc(conditionLabel(item))}</strong></div>
            <div class="fact"><span>Place for it</span><strong>${esc(answerLabel(item.has_home))}${item.location ? `: ${esc(item.location)}` : ""}</strong></div>
            <div class="fact"><span>Estimated value</span><strong>${money(item.estimated_value_cents)}</strong></div>
            ${repairFact(item)}
          </div>
          <div class="reasons">
            <div class="reason"><strong>Keep:</strong> ${esc(item.keep_reason || "No reason listed yet.")}</div>
            <div class="reason"><strong>Let go:</strong> ${esc(item.let_go_reason || "No reason listed yet.")}</div>
          </div>
          ${item.decision_note ? `<div class="reason" style="margin-top:10px"><strong>Decision:</strong> ${esc(item.decision_note)}</div>` : ""}
          ${renderDisposition(item)}
          <div class="action-panel">
            <div class="action-head">
              <span class="action-label">Your vote</span>
              <span class="subtle">${esc(tally)}</span>
            </div>
            <div class="vote-row">
              ${["keep", "let_go", "unsure"].map(vote => `<button class="btn btn-sm vote ${mine?.vote === vote ? "active" : ""}" onclick="castVote('${id}', '${vote}')">${statusLabels[vote]}</button>`).join("")}
              <button class="btn btn-sm btn-ghost edit-link" onclick="openItemModal('${id}')">Edit details</button>
            </div>
            ${renderAdultControls(item)}
          </div>
        </div> 
      </div>
      <div class="comments">
        ${itemComments.length ? itemComments.map(renderComment).join("") : `<div class="subtle">No comments yet.</div>`}
        <div class="comment-form">
          <input id="comment-${item.id}" placeholder="Add a reason, memory, repair note, or concern" />
          <button class="btn btn-sm btn-primary" onclick="addComment('${item.id}')">Add</button>
        </div>
      </div>
    </article>
  `;
}

function renderComment(comment) {
  const name = memberName(comment.member_id);
  return `
    <div class="comment">
      <span class="avatar" style="background:${colorFor(comment.member_id)}">${esc(initial(name))}</span>
      <div class="comment-body">
        <div class="subtle"><strong>${esc(name)}</strong> ${new Date(comment.created_at).toLocaleDateString()}</div>
        <p>${esc(comment.body)}</p>
      </div>
    </div>
  `;
}

function renderAdultControls(item) {
  const id = esc(item.id);
  if (!isAdult()) {
    return `<div class="adult-note" style="margin-top:12px">Adults finalize decisions and delete items.</div>`;
  }
  const canFinalize = ["active", "let_go", "unsure"].includes(item.status);
  const canRecordAction = item.status === "let_go" || !!item.disposition_action;
  if (!canFinalize && !canRecordAction) {
    return `
      <div class="action-head" style="margin-top:12px"><span class="action-label">Manage</span></div>
      <div class="decision-row"><button class="btn btn-sm danger edit-link" onclick="deleteItem('${id}')">Delete</button></div>
    `;
  }
  return `
    <div class="action-head" style="margin-top:12px">
      <span class="action-label">${canFinalize ? "Finalize decision" : "Manage action"}</span>
    </div>
    <div class="decision-row">
      ${canFinalize ? `<button class="btn btn-sm finalize" onclick="finalizeItem('${id}', 'keep')">Keep</button>
      <button class="btn btn-sm finalize" onclick="finalizeItem('${id}', 'let_go')">Let go</button>
      <button class="btn btn-sm finalize" onclick="finalizeItem('${id}', 'unsure')">Purge-atory</button>` : ""}
      ${canRecordAction ? `<button class="btn btn-sm btn-ghost" onclick="openDispositionModal('${id}')">${item.disposition_action ? "Update action" : "Record action"}</button>` : ""}
      <button class="btn btn-sm danger edit-link" onclick="deleteItem('${id}')">Delete</button>
    </div>
  `;
}

function renderDisposition(item) {
  if (item.status !== "let_go" && !item.disposition_action) return "";
  if (!item.disposition_action) {
    return `<div class="reason" style="margin-top:10px"><strong>Action taken:</strong> Not recorded yet.</div>`;
  }
  const label = dispositionLabels[item.disposition_action] ?? item.disposition_action;
  const parts = [
    label,
    item.disposition_at ? item.disposition_at : "",
    item.disposition_by ? `by ${memberName(item.disposition_by)}` : "",
    item.donation_reportable === "yes" ? "included in donation report" : "",
  ].filter(Boolean);
  return `
    <div class="reason" style="margin-top:10px">
      <strong>Action taken:</strong> ${esc(parts.join(" · "))}${item.disposition_note ? `<br>${esc(item.disposition_note)}` : ""}
    </div>
  `;
}

function answerLabel(value) {
  return ({ yes: "Yes", no: "No", maybe: "Maybe", unknown: "Unknown", working: "Working", broken: "Broken" })[value] ?? "Unknown";
}
function conditionLabel(item) {
  if (item.broken_status === "broken") return `Broken, repair ${answerLabel(item.repair_possible).toLowerCase()}`;
  return answerLabel(item.broken_status);
}
function repairFact(item) {
  if (item.broken_status !== "broken") return "";
  const repairCost = ["yes", "maybe"].includes(item.repair_possible) ? money(item.repair_cost_cents) : "Not applicable";
  return `<div class="fact"><span>Repair cost</span><strong>${repairCost}</strong></div>`;
}

window.setTab = function(key) {
  activeTab = key;
  pageByTab[key] = pageByTab[key] ?? 1;
  render();
};

window.setPage = function(page) {
  pageByTab[activeTab] = page;
  render();
};

window.setReportFilter = function(field, value) {
  reportState = { ...reportState, [field]: value };
  render();
};

window.resetReportYear = function() {
  const year = new Date().getFullYear();
  reportState = { ...reportState, from: `${year}-01-01`, to: `${year}-12-31` };
  render();
};

function reportCsv() {
  const header = ["Item", "Category", "Action", "Date", "Estimated Value", "Reportable Donation", "Notes"];
  const lines = reportRows().map(item => [
    item.name,
    item.category || "",
    dispositionLabels[item.disposition_action] ?? item.disposition_action,
    item.disposition_at,
    (Number(item.estimated_value_cents || 0) / 100).toFixed(2),
    item.donation_reportable === "yes" ? "yes" : "no",
    item.disposition_note || "",
  ]);
  return [header, ...lines].map(row => row.map(csvCell).join(",")).join("\n");
}

function csvCell(value) {
  return `"${String(value ?? "").replace(/"/g, '""')}"`;
}

window.copyReportCsv = async function() {
  const csv = reportCsv();
  try {
    await navigator.clipboard.writeText(csv);
    toast("Report CSV copied.");
  } catch {
    openModal(`
      <h3>Report CSV</h3>
      <div class="field"><textarea style="min-height:260px">${esc(csv)}</textarea></div>
      <div class="actions"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>
    `);
  }
};

window.downloadReportCsv = function() {
  const blob = new Blob([reportCsv()], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `let-go-actions-${reportState.from || "start"}-${reportState.to || "end"}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};

window.toggleItem = function(itemId) {
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  expandedById[itemId] = !isExpanded(item);
  render();
};

window.castVote = async function(itemId, vote) {
  const now = nowIso();
  const existing = votes.find(v => v.item_id === itemId && v.member_id === myId());
  if (DB) {
    if (existing) {
      await dbRun("UPDATE app_donations__votes SET vote = ?, updated_at = ? WHERE item_id = ? AND member_id = ?", [vote, now, itemId, myId()]);
    } else {
      await dbRun("INSERT INTO app_donations__votes (id, item_id, member_id, vote, note, created_at, updated_at) VALUES (?, ?, ?, ?, ?, ?, ?)", [crypto.randomUUID(), itemId, myId(), vote, "", now, now]);
    }
  }
  if (existing) {
    votes = votes.map(v => v === existing ? { ...v, vote, updated_at: now } : v);
  } else {
    votes = [{ id: crypto.randomUUID(), item_id: itemId, member_id: myId(), vote, note: "", created_at: now, updated_at: now }, ...votes];
  }
  render();
};

window.addComment = async function(itemId) {
  const input = document.getElementById(`comment-${itemId}`);
  const body = input?.value.trim();
  if (!body) return;
  const row = { id: crypto.randomUUID(), item_id: itemId, member_id: myId(), kind: "comment", body, created_at: nowIso() };
  if (DB) {
    await dbRun("INSERT INTO app_donations__comments (id, item_id, member_id, kind, body, created_at) VALUES (?, ?, ?, ?, ?, ?)", [row.id, row.item_id, row.member_id, row.kind, row.body, row.created_at]);
    await addActivity(itemId, "commented", body.slice(0, 80));
  }
  comments = [...comments, row];
  input.value = "";
  render();
};

window.finalizeItem = async function(itemId, status) {
  if (!isAdult()) {
    toast("Only adults can finalize decisions.");
    return;
  }
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const note = status === "unsure" ? "Moved to the Purge-atory box for later review." : `Decision: ${statusLabels[status]}.`;
  const reevaluate = status === "unsure" ? todayPlusMonths(6) : "";
  const now = nowIso();
  const updated = { ...item, status, decision_note: note, reevaluate_on: reevaluate, decided_by: myId(), decided_at: now, updated_at: now };
  if (DB) {
    await dbRun(
      "UPDATE app_donations__items SET status = ?, decision_note = ?, reevaluate_on = ?, decided_by = ?, decided_at = ?, updated_at = ? WHERE id = ?",
      [status, note, reevaluate, myId(), now, itemId]
    );
    await addActivity(itemId, "decision", status);
  }
  items = items.map(i => i.id === itemId ? updated : i);
  activeTab = status === "keep" ? "archive" : status;
  toast(status === "unsure" ? "Sent to Purge-atory for review." : `Moved to ${statusLabels[status]}.`);
  render();
};

window.deleteItem = async function(itemId) {
  if (!isAdult()) {
    toast("Only adults can delete items.");
    return;
  }
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const ok = await hubConfirm({
    message: `Delete "${item.name}"?`,
    description: "Votes, comments, and history for this item will be permanently removed.",
    confirmLabel: "Delete",
    destructive: true,
  });
  if (!ok) return;
  if (DB) {
    await dbRun("DELETE FROM app_donations__comments WHERE item_id = ?", [itemId]);
    await dbRun("DELETE FROM app_donations__votes WHERE item_id = ?", [itemId]);
    await dbRun("DELETE FROM app_donations__activity WHERE item_id = ?", [itemId]);
    await dbRun("DELETE FROM app_donations__items WHERE id = ?", [itemId]);
  }
  items = items.filter(i => i.id !== itemId);
  votes = votes.filter(v => v.item_id !== itemId);
  comments = comments.filter(c => c.item_id !== itemId);
  delete expandedById[itemId];
  toast("Item deleted.");
  render();
};

window.openDispositionModal = function(itemId) {
  if (!isAdult()) {
    toast("Only adults can record final actions.");
    return;
  }
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  openModal(`
    <h3>Record action</h3>
    <div class="field"><label>Item</label><input value="${esc(item.name)}" disabled /></div>
    <div class="form-grid">
      <div class="field">
        <label>Action taken</label>
        ${select("f-disposition-action", item.disposition_action || "donated", [
          ["donated", "Donated"],
          ["sold", "Sold"],
          ["recycled", "Recycled"],
          ["discarded", "Discarded"],
          ["given_away", "Given away"],
          ["other", "Other"],
        ])}
      </div>
      <div class="field"><label>Date</label><input id="f-disposition-at" type="date" value="${esc(item.disposition_at || new Date().toISOString().slice(0, 10))}" /></div>
      <div class="field"><label>Estimated value</label><input id="f-disposition-value" inputmode="decimal" value="${item?.estimated_value_cents ? (item.estimated_value_cents / 100) : ""}" placeholder="0" /></div>
      <div class="field" id="donation-report-field">
        <label>Donation report</label>
        <select id="f-donation-reportable">
          <option value="yes" ${item.donation_reportable === "yes" ? "selected" : ""}>Include</option>
          <option value="no" ${item.donation_reportable !== "yes" ? "selected" : ""}>Do not include</option>
        </select>
      </div>
    </div>
    <div class="field"><label>Notes</label><textarea id="f-disposition-note" placeholder="Where it went, receipt note, buyer, etc.">${esc(item.disposition_note ?? "")}</textarea></div>
    <div class="actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveDisposition('${esc(item.id)}')">Save action</button>
    </div>
  `);
  document.getElementById("f-disposition-action")?.addEventListener("change", updateDonationReportField);
  updateDonationReportField();
};

function updateDonationReportField() {
  const action = document.getElementById("f-disposition-action")?.value;
  const field = document.getElementById("donation-report-field");
  if (field) field.style.display = action === "donated" ? "" : "none";
}

window.saveDisposition = async function(itemId) {
  if (!isAdult()) {
    toast("Only adults can record final actions.");
    return;
  }
  const item = items.find(i => i.id === itemId);
  if (!item) return;
  const action = document.getElementById("f-disposition-action").value;
  const dispositionAt = document.getElementById("f-disposition-at").value;
  const note = document.getElementById("f-disposition-note").value.trim();
  const reportable = action === "donated" ? document.getElementById("f-donation-reportable").value : "no";
  const value = centsFrom("f-disposition-value");
  const now = nowIso();
  const updated = {
    ...item,
    status: "archived",
    estimated_value_cents: value,
    disposition_action: action,
    disposition_at: dispositionAt,
    disposition_note: note,
    disposition_by: myId(),
    donation_reportable: reportable,
    updated_at: now,
  };
  if (DB) {
    await dbRun(
      "UPDATE app_donations__items SET status = ?, estimated_value_cents = ?, disposition_action = ?, disposition_at = ?, disposition_note = ?, disposition_by = ?, donation_reportable = ?, updated_at = ? WHERE id = ?",
      ["archived", value, action, dispositionAt, note, myId(), reportable, now, itemId]
    );
    await addActivity(itemId, "disposition", action);
  }
  items = items.map(i => i.id === itemId ? updated : i);
  activeTab = "archive";
  closeModal();
  toast("Action recorded and item archived.");
  render();
};

function openModal(html) {
  closeModal();
  modalEl = document.createElement("div");
  modalEl.className = "modal-backdrop";
  modalEl.innerHTML = `<div class="modal">${html}</div>`;
  modalEl.addEventListener("click", event => { if (event.target === modalEl) closeModal(); });
  document.body.appendChild(modalEl);
}
function closeModal() {
  modalEl?.remove();
  modalEl = null;
}
window.closeModal = closeModal;

window.openItemModal = function(itemId = "") {

  openModal(`
    <h3>${item ? "Edit item" : "Add item"}</h3>

    <div class="form-grid">

      <div class="field"><label>Condition</label>${select("f-broken", item?.broken_status ?? "unknown", [["unknown", "Unknown"], ["working", "Working"], ["broken", "Broken"]])}</div>
      <div class="field"><label>Has a sensible place?</label>${select("f-home", item?.has_home ?? "unknown", [["unknown", "Unknown"], ["yes", "Yes"], ["no", "No"], ["maybe", "Maybe"]])}</div>
      <div class="field repair-field"><label>Repair possible?</label>${select("f-repair", item?.repair_possible ?? "unknown", [["unknown", "Unknown"], ["yes", "Yes"], ["no", "No"], ["maybe", "Maybe"]])}</div>
      <div class="field repair-cost-field"><label>Repair cost</label><input id="f-repair-cost" inputmode="decimal" value="${item?.repair_cost_cents ? (item.repair_cost_cents / 100) : ""}" placeholder="0" /></div>
      <div class="field"><label>Estimated value</label><input id="f-estimated-value" inputmode="decimal" value="${item?.estimated_value_cents ? (item.estimated_value_cents / 100) : ""}" placeholder="0" /></div>

    <div class="field"><label>Why keep it?</label><textarea id="f-keep">${esc(item?.keep_reason ?? "")}</textarea></div>

    <div class="actions">

  `);
  document.getElementById("f-broken")?.addEventListener("change", updateRepairFields);
  document.getElementById("f-repair")?.addEventListener("change", updateRepairFields);
  updateRepairFields();

};

function select(id, value, opts) {
  return `<select id="${id}">${opts.map(([v, label]) => `<option value="${v}" ${value === v ? "selected" : ""}>${label}</option>`).join("")}</select>`;
}
function centsFrom(id) {
  const value = document.getElementById(id)?.value.trim() ?? "";
  if (!value) return 0;
  return Math.max(0, Math.round(Number(value.replace(/[^0-9.]/g, "")) * 100) || 0);
}
function updateRepairFields() {
  const broken = document.getElementById("f-broken")?.value === "broken";
  const repair = document.getElementById("f-repair")?.value ?? "unknown";
  document.querySelectorAll(".repair-field").forEach(el => { el.style.display = broken ? "" : "none"; });
  document.querySelectorAll(".repair-cost-field").forEach(el => {
    el.style.display = broken && ["yes", "maybe"].includes(repair) ? "" : "none";
  });
}

    toast("Add an item name first.");

    estimated_value_cents: centsFrom("f-estimated-value"),

    disposition_action: itemId ? (items.find(i => i.id === itemId)?.disposition_action ?? "") : "",
    disposition_at: itemId ? (items.find(i => i.id === itemId)?.disposition_at ?? "") : "",
    disposition_note: itemId ? (items.find(i => i.id === itemId)?.disposition_note ?? "") : "",
    disposition_by: itemId ? (items.find(i => i.id === itemId)?.disposition_by ?? "") : "",
    donation_reportable: itemId ? (items.find(i => i.id === itemId)?.donation_reportable ?? "no") : "no",
    reevaluate_on: itemId ? (items.find(i => i.id === itemId)?.reevaluate_on ?? "") : "",
    decided_by: itemId ? (items.find(i => i.id === itemId)?.decided_by ?? "") : "",
    decided_at: itemId ? (items.find(i => i.id === itemId)?.decided_at ?? "") : "",
    created_at: itemId ? (items.find(i => i.id === itemId)?.created_at ?? now) : now,
    updated_at: now,
  };
  if (DB) {
    if (itemId) {
      await dbRun(
        "UPDATE app_donations__items SET name = ?, category = ?, location = ?, used_recently = ?, broken_status = ?, repair_possible = ?, repair_cost_cents = ?, estimated_value_cents = ?, has_home = ?, keep_reason = ?, let_go_reason = ?, updated_at = ? WHERE id = ?",
        [row.name, row.category, row.location, row.used_recently, row.broken_status, row.repair_possible, row.repair_cost_cents, row.estimated_value_cents, row.has_home, row.keep_reason, row.let_go_reason, now, itemId]
      );
      await addActivity(itemId, "updated", "");
    } else {
      await dbRun(
        "INSERT INTO app_donations__items (id, name, category, location, photo_url, created_by, status, visibility, used_recently, broken_status, repair_possible, repair_cost_cents, estimated_value_cents, has_home, keep_reason, let_go_reason, decision_note, disposition_action, disposition_at, disposition_note, disposition_by, donation_reportable, reevaluate_on, decided_by, decided_at, created_at, updated_at) VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?)",
        [row.id, row.name, row.category, row.location, row.photo_url, row.created_by, row.status, row.visibility, row.used_recently, row.broken_status, row.repair_possible, row.repair_cost_cents, row.estimated_value_cents, row.has_home, row.keep_reason, row.let_go_reason, row.decision_note, row.disposition_action, row.disposition_at, row.disposition_note, row.disposition_by, row.donation_reportable, row.reevaluate_on, row.decided_by, row.decided_at, row.created_at, row.updated_at]
      );
      await addActivity(row.id, "created", row.name);
    }
  }
  items = itemId ? items.map(i => i.id === itemId ? row : i) : [row, ...items];
  activeTab = row.status === "keep" ? "archive" : row.status;
  closeModal();
  render();
};

function toast(message) {
  clearTimeout(toastTimer);
  document.querySelector(".toast")?.remove();
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = message;
  document.body.appendChild(el);
  toastTimer = setTimeout(() => el.remove(), 2200);
}

(async function init() {
  await loadMembers();
  await loadData();
  render();
})();
</script>
</body>
</html>
